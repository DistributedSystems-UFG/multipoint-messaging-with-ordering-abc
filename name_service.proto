// name_service.proto
syntax = "proto3";

package nameservice;

service NameDirectoryService {
  rpc Bind (BindRequest) returns (StatusResponse);
  rpc Lookup (LookupRequest) returns (AddressResponse);
  rpc Unbind (UnbindRequest) returns (StatusResponse);
  rpc RegisterType (RegisterTypeRequest) returns (StatusResponse);
  rpc Discover (DiscoverRequest) returns (DiscoverResponse);
}

message Address {
  string ip = 1;
  int32 port = 2;
}

message BindRequest {
  string name = 1;
  Address address = 2;
}

message LookupRequest {
  string name = 1;
}

message AddressResponse {
  bool success = 1;
  Address address = 2;
  string error_message = 3;
}

message UnbindRequest {
  string name = 1;
}

message RegisterTypeRequest {
  string name = 1;
  string type = 2;
}

message StatusResponse {
  bool success = 1;
  string error_message = 2;
}

message DiscoverRequest {
  string type = 1;
}

message ProcessInfo {
  string name = 1;
  Address address = 2;
}

message DiscoverResponse {
  repeated ProcessInfo processes = 1;
}